services:
  gitbox:
    image: semanticrelease/docker-gitbox:latest@sha256:c0c2a595740e070c4b4dbe5bcd389da21e670008958967e74cd1a9ba8bcb3afa
    tty: true
    stdin_open: true
    ports:
      - "80"

  npm-registry:
    image: verdaccio/verdaccio:6.7.4@sha256:e3ac7e335e69504cd0b09616aa52066399868282313c34762d2a77b8169a3575
    ports:
      - "4873"
    volumes:
      - ./config.yaml:/verdaccio/conf/config.yaml:ro

  mockserver:
    image: mockserver/mockserver:7.3.0@sha256:321937ef06cb8d7004a6302505498c005e202322fd33debcc10c039a9b859946
    ports:
      - "1080"
